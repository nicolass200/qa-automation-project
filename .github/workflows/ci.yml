name: QA Automation

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes API
        run: PYTHONPATH=. pytest api_tests -v

      - name: Rodar testes WEB
        run: PYTHONPATH=. pytest web_tests -v